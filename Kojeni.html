<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker kojení</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1rem; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 1rem 0; }
    h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; margin-bottom: 16px; text-align: center; }
    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 12px; }
    .label-s { font-size: 13px; color: #888; margin-bottom: 10px; font-weight: 500; }
    .side-btns { display: flex; gap: 8px; margin-bottom: 16px; }
    .side-btn { flex: 1; padding: 14px 8px; font-size: 15px; font-weight: 500; border: 0.5px solid #ccc; border-radius: 8px; background: #f5f5f0; color: #1a1a1a; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .side-btn.active { background: #EEEDFE; border-color: #7F77DD; color: #3C3489; }
    .side-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .timer { font-size: 52px; font-weight: 500; text-align: center; color: #1a1a1a; font-variant-numeric: tabular-nums; letter-spacing: -2px; margin-bottom: 4px; }
    .status-text { text-align: center; font-size: 13px; color: #888; margin-bottom: 12px; min-height: 18px; }
    .hint { font-size: 13px; color: #A32D2D; text-align: center; margin-bottom: 10px; min-height: 18px; }
    .big-btn { width: 100%; padding: 18px; font-size: 17px; font-weight: 500; border-radius: 12px; border: none; cursor: pointer; transition: transform 0.1s, background 0.15s; }
    .big-btn:active { transform: scale(0.98); }
    .start-btn { background: #7F77DD; color: #fff; }
    .start-btn:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; transform: none; }
    .stop-btn { background: #E24B4A; color: #fff; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; color: #1a1a1a; }
    .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid rgba(0,0,0,0.1); font-size: 14px; }
    .hist-item:last-child { border-bottom: none; }
    .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .badge-l { background: #E6F1FB; color: #185FA5; }
    .badge-r { background: #FAEEDA; color: #854F0B; }
    .del-btn { background: none; border: none; cursor: pointer; color: #bbb; font-size: 16px; padding: 4px; line-height: 1; }
    .del-btn:hover { color: #E24B4A; }
    .empty { color: #bbb; font-size: 14px; text-align: center; padding: 1rem 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🤱 Tracker kojení</h1>

    <div class="card">
      <p class="label-s">Strana</p>
      <div class="side-btns">
        <button class="side-btn" id="btn-l" onclick="setSide('L')">👈 Levá</button>
        <button class="side-btn" id="btn-r" onclick="setSide('R')">Pravá 👉</button>
      </div>
      <div class="timer" id="timer">0:00</div>
      <p class="status-text" id="status-text">Připraveno ke startu</p>
      <p class="hint" id="hint"></p>
      <button class="big-btn start-btn" id="main-btn" onclick="toggleTimer()" disabled>▶ Začít kojení</button>
    </div>

    <div class="card">
      <div class="stats-grid">
        <div>
          <p class="stat-label">Dnes celkem</p>
          <p class="stat-value" id="today-count">0×</p>
        </div>
        <div>
          <p class="stat-label">Celkový čas</p>
          <p class="stat-value" id="today-time">0 min</p>
        </div>
        <div>
          <p class="stat-label">Průměr</p>
          <p class="stat-value" id="avg-time">–</p>
        </div>
      </div>
    </div>

    <div class="card">
      <p class="label-s">Historie</p>
      <div id="history"><p class="empty">Zatím žádný záznam</p></div>
    </div>
  </div>

  <script>
    let side = null;
    let running = false;
    let startTime = null;
    let interval = null;
    let sessions = JSON.parse(localStorage.getItem('kojeni') || '[]').map(s => ({ ...s, startDate: new Date(s.startDate) }));

    renderHistory();
    renderStats();

    function setSide(s) {
      if (running) return;
      side = s;
      document.getElementById('btn-l').classList.toggle('active', s === 'L');
      document.getElementById('btn-r').classList.toggle('active', s === 'R');
      document.getElementById('main-btn').disabled = false;
      document.getElementById('hint').textContent = '';
    }

    function fmt(sec) {
      const m = Math.floor(sec / 60), s = sec % 60;
      return m + ':' + String(s).padStart(2, '0');
    }

    function fmtTime(d) {
      return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function toggleTimer() {
      if (!running) {
        if (!side) {
          document.getElementById('hint').textContent = 'Nejdříve vyber stranu';
          return;
        }
        running = true;
        startTime = Date.now();
        document.getElementById('main-btn').className = 'big-btn stop-btn';
        document.getElementById('main-btn').textContent = '⏹ Ukončit kojení';
        document.getElementById('btn-l').disabled = true;
        document.getElementById('btn-r').disabled = true;
        document.getElementById('status-text').textContent = (side === 'L' ? 'Levá strana' : 'Pravá strana') + ' – probíhá';
        interval = setInterval(tick, 1000);
      } else {
        const dur = Math.round((Date.now() - startTime) / 1000);
        clearInterval(interval);
        running = false;
        sessions.push({ side, startDate: new Date(startTime), dur });
        save();
        document.getElementById('timer').textContent = '0:00';
        document.getElementById('main-btn').className = 'big-btn start-btn';
        document.getElementById('main-btn').textContent = '▶ Začít kojení';
        document.getElementById('main-btn').disabled = true;
        document.getElementById('btn-l').disabled = false;
        document.getElementById('btn-r').disabled = false;
        document.getElementById('btn-l').classList.remove('active');
        document.getElementById('btn-r').classList.remove('active');
        document.getElementById('status-text').textContent = 'Připraveno ke startu';
        side = null;
        renderHistory();
        renderStats();
      }
    }

    function tick() {
      const sec = Math.round((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent = fmt(sec);
    }

    function deleteSession(i) {
      sessions.splice(i, 1);
      save();
      renderHistory();
      renderStats();
    }

    function save() {
      localStorage.setItem('kojeni', JSON.stringify(sessions));
    }

    function renderHistory() {
      const el = document.getElementById('history');
      const today = new Date().toDateString();
      const todaySessions = sessions.filter(s => new Date(s.startDate).toDateString() === today);
      if (!todaySessions.length) { el.innerHTML = '<p class="empty">Zatím žádný záznam</p>'; return; }
      el.innerHTML = [...todaySessions].reverse().map((s, ri) => {
        const i = sessions.lastIndexOf(todaySessions[todaySessions.length - 1 - ri]);
        return `<div class="hist-item">
          <span style="color:#888">${fmtTime(new Date(s.startDate))}</span>
          <span class="badge ${s.side === 'L' ? 'badge-l' : 'badge-r'}">${s.side === 'L' ? 'Levá' : 'Pravá'}</span>
          <span style="font-weight:500">${fmt(s.dur)}</span>
          <button class="del-btn" onclick="deleteSession(${i})" title="Smazat">✕</button>
        </div>`;
      }).join('');
    }

    function renderStats() {
      const today = new Date().toDateString();
      const todaySessions = sessions.filter(s => new Date(s.startDate).toDateString() === today);
      document.getElementById('today-count').textContent = todaySessions.length + '×';
      const total = todaySessions.reduce((a, s) => a + s.dur, 0);
      document.getElementById('today-time').textContent = Math.round(total / 60) + ' min';
      document.getElementById('avg-time').textContent = todaySessions.length ? Math.round(total / 60 / todaySessions.length) + ' min' : '–';
    }
  </script>
</body>
</html>
